backend = "glx";
vsync = true;
glx-use-copysubbuffer-mesa = true;
glx-copy-from-front = true;
glx-swap-method = 2;

xrender-sync = true;
xrender-sync-fence = true;

no-fading-openclose = false;

# Opacity 
active-opacity = 1.0;
inactive-opacity = 1.0;
blur-background = false;

blur-method = "dual_kawase";
blur-strength = 6;

blur-background-exclude = [
  "role   = 'xborder'",
  "window_type = 'dock'",
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'tooltip'",
  "window_type = 'dnd'",
  "window_type = 'utility'",
  "class_g = 'dmenu'",
  "class_g = 'Google-chrome' && window_type = 'popup_menu'",
  "class_g = 'Google-chrome' && window_type = 'utility'",
  "class_g = 'Nautilus' && window_type = 'menu'",
  "_NET_WM_STATE@:a *= '_NET_WM_STATE_MODAL'",
];

opacity-exclude = [
	"window_type = 'dock'",
	"class_g = 'dmenu'"
];

focus-exclude = [
	"window_type = 'dock'",
	"class_g = 'dmenu'",
];

# >>> Fix background flickering during workspace switching

# Fade windows during opacity changes
fading = true; 

# Opacity change between steps while fading in
fade-in-step = 1; 

# Opacity change between steps while fading out
fade-out-step = 1; 

# The time between steps in a fade in milliseconds
fade-delta = 1;

fade-exclude = [ "class_g = 'i3lock'" ];
