# import colors
general.import = ["~/.config/alacritty/gruvbox_material_medium_dark_2.toml"]

[font]
size = 11.0

[font.normal]
family = "CommitMono Nerd Font"
style = "Normal"

[font.bold]
family = "CommitMono Nerd Font"
style = "Bold"

[font.italic]
family = "CommitMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "CommitMono Nerd Font"
style = "Bold Italic"

[window]
padding = { x = 10, y = 10 }
startup_mode = "Maximized"

[cursor]
style = { shape = "Beam", blinking = "On" }
