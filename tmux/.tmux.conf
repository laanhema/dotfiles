# tmux config file

set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',alacritty:RGB,xterm-256color:RGB,kitty:RGB'
set -ag terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[5 q'

set -g prefix C-s

set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -g base-index 1
set -g @continuum-boot 'on'

# adds a line separator between actual prompt and bottom status bar
set-window-option -g pane-border-status bottom
set-window-option -g pane-border-format ''

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'hasundue/tmux-gruvbox-material'
set -g @gruvbox-material_theme 'dark'
set -g @gruvbox-material_contrast 'medium'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum' # keep this as last

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
